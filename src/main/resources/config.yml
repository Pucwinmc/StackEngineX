# ==============================
# StackEngineX Configuration
# Author: Phúc Dev 😎
# ==============================

stack:

  # Số lượng tối đa có thể chứa (64 + stored)
  # Ví dụ 128 = 1 stack hiển thị + 64 stored
  default-max: 128

  # Nếu true → chỉ item có max stack = 64 mới được stack
  # Nếu false → mọi item đều có thể stack
  only-64-stackable: true

  # Giới hạn theo permission
  # -1 = không giới hạn
  permission-limits:
    stack.vip: 256
    stack.mvp: 512
    stack.unlimited: -1



stored:

  # Khi item có stored sẽ phát sáng (glow)
  glowing-when-stored: true

  lore:
    enabled: true

    # Các placeholder có thể dùng:
    # {stored}  = số lượng đang lưu trữ
    # {total}   = tổng (64 + stored)
    # {max}     = giới hạn tối đa
    # {percent} = phần trăm đã dùng

    format:
      - "&7────────────"
      - "&eStored: &f{stored}"
      - "&eTotal: &f{total}/{max}"
      - "&eUsed: &f{percent}%"
      - "&7────────────"



effects:

  enabled: true

  # ================= STORED (khi bắt đầu nén) =================
  stored:

    sound: ENTITY_EXPERIENCE_ORB_PICKUP
    volume: 1.0
    pitch: 1.2

    particle: VILLAGER_HAPPY
    particle-count: 20

    title:
      enabled: true
      main: "&6Bắt đầu nén!"
      sub: "&eItem đã được lưu trữ"
      fade-in: 10
      stay: 30
      fade-out: 10


  # ================= REFILL (khi dùng hết stored) =================
  refill:

    sound: UI_TOAST_CHALLENGE_COMPLETE
    volume: 1.0
    pitch: 1.0

    title:
      enabled: true
      main: "&aStored đã hết!"
      sub: "&eStack trở về bình thường"
      fade-in: 10
      stay: 40
      fade-out: 10



# ================= ACTIONBAR =================
actionbar:

  enabled: true

  # Placeholder:
  # {stored}
  # {total}
  # {max}

  format: "&eStored: {stored} &7| &fTotal: {total}/{max}"
