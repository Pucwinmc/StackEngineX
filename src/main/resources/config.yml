# ===============================
#       StackEngine Config
# ===============================
# Plugin nén item vượt 64 stack
# Tác giả: Phúc Dev 😎
# ===============================


# ==========================================
#              STACK SETTINGS
# ==========================================
stack:

  # Số lượng tối đa mặc định mà 1 player có thể stack
  # Ví dụ:
  # 128 = 2 stack
  # 256 = 4 stack
  # -1 = không giới hạn
  default-max: 128

  # Chỉ cho phép stack item có max stack size = 64
  # true  = chỉ đá, dirt, cobble, v.v...
  # false = cho phép cả item 16 stack (ender pearl, egg...)
  only-64-stackable: true


  # Giới hạn theo permission
  # Nếu player có permission bên dưới thì sẽ override default-max
  permission-limits:
    stack.limit.vip: 256
    stack.limit.mvp: 512
    stack.limit.unlimited: -1



# ==========================================
#              STORED SETTINGS
# ==========================================
stored:

  # Có làm item phát sáng khi có stored không
  glowing-when-stored: true


  lore:
    # Bật / tắt lore hiển thị thông tin
    enabled: true

    # Format lore
    # Placeholder:
    # {stored}  = số lượng đang lưu trữ
    # {total}   = tổng số lượng (64 + stored)
    # {max}     = giới hạn tối đa
    # {percent} = % so với max
    format:
      - "&7&m---------------------"
      - "&6Stored: &e{stored}"
      - "&6Total: &e{total}/{max}"
      - "&6Full: &e{percent}%"
      - "&7&m---------------------"



# ==========================================
#              ACTIONBAR
# ==========================================
actionbar:

  # Hiển thị thanh actionbar khi cầm item có stored
  enabled: true

  # Placeholder giống lore
  format: "&eStored: {stored} &7| &fTotal: {total}/{max}"



# ==========================================
#              EFFECTS
# ==========================================
effects:

  # Bật / tắt toàn bộ sound + particle
  enabled: true


  # ---------------------------
  # Khi bắt đầu nén (stored)
  # ---------------------------
  stored:

    sound: ENTITY_EXPERIENCE_ORB_PICKUP
    volume: 1.0
    pitch: 1.2

    particle: VILLAGER_HAPPY
    particle-count: 20

    title:
      enabled: true
      main: "&6Bắt đầu nén!"
      sub: "&eItem đã được lưu trữ"
      fade-in: 10
      stay: 30
      fade-out: 10


  # ---------------------------
  # Khi hết stored (refill)
  # ---------------------------
  refill:

    sound: UI_TOAST_CHALLENGE_COMPLETE
    volume: 1.0
    pitch: 1.0

    title:
      enabled: true
      main: "&aStored đã hết!"
      sub: "&eStack trở về bình thường"
      fade-in: 10
      stay: 40
      fade-out: 10
