stack:
  default-max: 128   # Giới hạn stack mặc định
  only-64-stackable: true  # Chỉ áp dụng với item stack 64

  permission-limits:
    stack.vip: 256    # Ai có perm này max = 256
    stack.admin: -1   # -1 = không giới hạn

stored:
  glowing-when-stored: true  # Item phát sáng khi có stored

  lore:
    enabled: true
    format:
      - "&7&m------------------"
      - "&eStored: &f{stored}"
      - "&eTotal: &f{total}/{max}"
      - "&eProgress: &f{percent}%"
      - "&7&m------------------"

actionbar:
  enabled: true
  format: "&eStored: {stored} &7| &fTotal: {total}/{max}"

effects:
  enabled: true

  stored:
    sound: ENTITY_EXPERIENCE_ORB_PICKUP
    volume: 1.0
    pitch: 1.2
    particle: VILLAGER_HAPPY
    particle-count: 20

  refill:
    sound: UI_TOAST_CHALLENGE_COMPLETE
    volume: 1.0
    pitch: 1.0

    title:
      enabled: true
      main: "&aStored đã hết!"
      sub: "&eStack trở về bình thường"
      fade-in: 10
      stay: 40
      fade-out: 10
